<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trái Tim Đơn Giản</title>
    <style>
        /* Căn giữa toàn bộ màn hình */
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #fce4ec; /* Màu nền hồng nhạt */
        }

        /* Tạo hình trái tim bằng CSS */
        .heart {
            position: relative;
            width: 100px;
            height: 100px;
            background-color: #ff1744; /* Màu đỏ của trái tim */
            transform: rotate(-45deg);
            animation: heartbeat 1.2s infinite; /* Hiệu ứng đập */
            box-shadow: 0 0 20px rgba(255, 23, 68, 0.5);
        }

        /* Hai khối tròn phía trên để hoàn thiện hình trái tim */
        .heart::before,
        .heart::after {
            content: '';
            position: absolute;
            width: 100px;
            height: 100px;
            background-color: #ff1744;
            border-radius: 50%;
        }

        .heart::before {
            top: -50px;
            left: 0;
        }

        .heart::after {
            top: 0;
            left: 50px;
        }

        /* Hiệu ứng đập (co giãn) */
        @keyframes heartbeat {
            0% {
                transform: rotate(-45deg) scale(1);
            }
            20% {
                transform: rotate(-45deg) scale(1.1);
            }
            40% {
                transform: rotate(-45deg) scale(1);
            }
            60% {
                transform: rotate(-45deg) scale(1.15);
            }
            100% {
                transform: rotate(-45deg) scale(1);
            }
        }
    </style>
</head>
<body>

    <!-- Khối hiển thị trái tim -->
    <div class="heart"></div>

</body>
</html>
